<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMW Header Clone</title>
    <link rel="stylesheet" href="inno.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>

    <header class="header">

        <!-- TOP NAV -->

        <div class="top-nav">

            <div class="brands">

                <h1 class="logo-text">
                    BMW <br>
                    GROUP
                </h1>

                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt="">

                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/MINI_logo_2015.svg" alt="">

                <img class="rr"
                    src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Rolls-Royce_Motor_Cars_logo.svg" alt="">

            </div>

            <div class="right-controls">

                <button class="lang-btn">
                    EN
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

            </div>

        </div>

        <!-- LINE -->

        <div class="line"></div>

        <!-- BOTTOM NAV -->

        <div class="bottom-nav">

            <nav>

                <a href="#">The Company BMW Group</a>

                <a href="#" class="active">
                    Innovation
                </a>

                <a href="#">
                    Responsibility & Sustainability
                </a>

                <a href="#">
                    Investor Relations
                </a>

                <a href="#">News</a>

                <a href="#">
                    Media
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>

                <a href="#">
                    Careers
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>

            </nav>

            <div class="search">

                <i class="fa-solid fa-magnifying-glass"></i>

                <span>Search</span>

            </div>

        </div>

        <!-- BREADCRUMB -->

        <div class="breadcrumb">

            <i class="fa-solid fa-house"></i>

            <i class="fa-solid fa-angle-right"></i>

            <span>Innovation</span>

        </div>

    </header>
    <script src="inno.js"></script>

</body>

</html>
